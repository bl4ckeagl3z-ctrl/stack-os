name: Build STACK OS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y kpartx git python3 python3-pip
    - name: Setup pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmb
        pip3 install --user /tmp/pmb || true
        printf '#!/usr/bin/env python3\nfrom pmb import main\nimport sys\nsys.exit(main())\n' | sudo tee /usr/local/bin/pmbootstrap
        sudo chmod +x /usr/local/bin/pmbootstrap
        pmbootstrap --version
    - name: Write config
      run: |
        mkdir -p ~/.config ~/.local/var/pmbootstrap
        python3 -c "cfg='[pmbootstrap]\naports=/home/runner/.local/var/pmbootstrap/cache_git/pmaports\nccache_size=5G\ndevice=samsung-degaswifi\nextra_packages=\nhostname=stack-os\njobs=2\nkeymap=\nlocale=de_DE\nmirrors_postmarketos=https://mirror.postmarketos.org/postmarketos/\nnonfree_firmware=True\nssh_keys=False\ntimezone=Etc/UTC\nui=xfce4\nusername=user\nwork=/home/runner/.local/var/pmbootstrap\nchannel=edge\nsystemd=never\n'; open('/home/runner/.config/pmbootstrap.cfg','w').write(cfg)"
    - name: Pull pmaports
      run: pmbootstrap pull
    - name: Build image
      run: |
        pmbootstrap install --password stackos123 || true
        pmbootstrap chroot --rootfs -- sh -c "printf '' > /usr/share/mkinitfs/modules/00-default.modules"
        pmbootstrap chroot --rootfs -- apk add mkbootimg
        pmbootstrap install --password stackos123
    - name: Export
      run: |
        mkdir -p /tmp/export
        pmbootstrap export /tmp/export || true
        ls /tmp/export/ || true
    - uses: actions/upload-artifact@v4
      with:
        name: stack-os-degaswifi
        path: /tmp/export/
        retention-days: 7