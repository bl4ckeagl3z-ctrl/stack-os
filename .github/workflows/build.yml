name: Build STACK OS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y kpartx git python3 python3-pip
    - name: Setup pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmb
        pip3 install --user /tmp/pmb || true
        python3 -c "open('/usr/local/bin/pmbootstrap','w').write('#!/usr/bin/env python3\nimport sys\nsys.path.insert(0,\"/tmp/pmb\")\nfrom pmb import main\nsys.exit(main())\n')"
        sudo chmod +x /usr/local/bin/pmbootstrap
    - name: Init pmbootstrap
      run: |
        printf '\n\n\nsamsung\ndegaswifi\ny\nuser\n\n\n\nxfce4\nnever\nn\n\n\nde_DE\nstack-os\nn\n' | pmbootstrap init
    - name: Pull pmaports
      run: pmbootstrap pull
    - name: Build image
      run: |
        pmbootstrap install --password stackos123 || true
        pmbootstrap chroot --rootfs -- sh -c "printf '' > /usr/share/mkinitfs/modules/00-default.modules"
        pmbootstrap chroot --rootfs -- apk add mkbootimg
        pmbootstrap install --password stackos123
    - name: Export
      run: |
        mkdir -p /tmp/export
        pmbootstrap export /tmp/export || true
        ls /tmp/export/ || true
    - uses: actions/upload-artifact@v4
      with:
        name: stack-os-degaswifi
        path: /tmp/export/
        retention-days: 7
