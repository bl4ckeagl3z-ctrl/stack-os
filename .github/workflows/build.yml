name: Build STACK OS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y kpartx git python3 python3-pip
    - name: Setup pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmb
        sudo cp pmb_wrapper.py /usr/local/bin/pmbootstrap
        sudo chmod +x /usr/local/bin/pmbootstrap
        pmbootstrap --version
    - name: Init pmbootstrap
      run: printf '\n\n\nsamsung\ndegaswifi\ny\nuser\n\n\n\nxfce4\nnever\nn\nmkbootimg\n\nde_DE\nstack-os\nn\n' | pmbootstrap init
    - name: Pull pmaports
      run: pmbootstrap pull
    - name: Install packages
      run: pmbootstrap install --password stackos123 || true
    - name: Fix and run mkinitfs
      run: |
        pmbootstrap chroot --rootfs -- sh -c "truncate -s 0 /usr/share/mkinitfs/modules/00-default.modules"
        pmbootstrap chroot --rootfs -- sh -c "truncate -s 0 /usr/share/mkinitfs/modules/00-device-samsung-degaswifi.modules"
        pmbootstrap chroot --rootfs -- sh -c "truncate -s 0 /usr/share/mkinitfs/modules-extra/00-default-extra.modules"
        pmbootstrap chroot --rootfs -- sh -c "mkdir -p /usr/lib/modules/3.10.0-Downstream && touch /usr/lib/modules/3.10.0-Downstream/modules.dep"
        pmbootstrap chroot --rootfs -- mkinitfs
    - name: Export images
      run: |
        mkdir -p /tmp/export
        pmbootstrap export /tmp/export
        ls -la /tmp/export/
    - uses: actions/upload-artifact@v4
      with:
        name: stack-os-degaswifi
        path: /tmp/export/
        retention-days: 7
