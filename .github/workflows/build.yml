name: Build STACK OS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y kpartx git python3 python3-pip
    - name: Setup pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmb
        sudo cp pmb_wrapper.py /usr/local/bin/pmbootstrap
        sudo chmod +x /usr/local/bin/pmbootstrap
        python3 fix_initfs.py
        pmbootstrap --version
    - name: Init pmbootstrap
      run: printf '\n\n\nsamsung\ndegaswifi\ny\nuser\n\n\n\nxfce4\nnever\nn\nmkbootimg\n\nde_DE\nstack-os\nn\n' | pmbootstrap init
    - name: Enable loop partitions
      run: sudo modprobe -r loop 2>/dev/null || true; sudo modprobe loop max_part=16 2>/dev/null || true
    - name: Pull pmaports
      run: pmbootstrap pull
    - name: Build image
      run: pmbootstrap install --password stackos123
    - name: Export
      run: |
        mkdir -p /tmp/export
        pmbootstrap export /tmp/export || true
        ls /tmp/export/ || true
    - uses: actions/upload-artifact@v4
      with:
        name: stack-os-degaswifi
        path: /tmp/export/
        retention-days: 7
